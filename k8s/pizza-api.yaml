apiVersion: apps/v1
kind: Deployment
metadata:
  name: pizza-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pizza-api
  template:
    metadata:
      labels:
        app: pizza-api
    spec:
      containers:
        - name: pizza-api
          image: pizza-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6000
---
apiVersion: v1
kind: Service
metadata:
  name: pizza-api
spec:
  type: ClusterIP
  selector:
    app: pizza-api
  ports:
    - port: 6000
      targetPort: 6000
